<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔥 Heading TOP CENTER -->
    <h1>Tic Tac Toe 🎮</h1>

    <!-- 🎯 Game Container -->
    <div id="board-container">

        <!-- 🧠 Status -->
        <h2 id="status">Player X's Turn</h2>

        <!-- 🎲 Board -->
        <div id="board">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>

            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>

            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <!-- 🔄 Reset -->
        <button id="resetBtn">Reset Game 🔄</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
